services:
  # ── Backend (FastAPI) ──────────────────────────────────────────
  - type: web
    name: Backend
    env: python
    rootDir: Backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd app && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      # ── Set these in the Render dashboard ──
      - key: FRONTEND_URL
        sync: false          # fill manually in Render dashboard
      - key: DB_Host
        sync: false
      - key: DB_User
        sync: false
      - key: DB_Password
        sync: false
      - key: DB_Name
        sync: false
      - key: Sender_Email
        sync: false
      - key: App_Password
        sync: false

  # ── Frontend (Vite/React Static Site) ─────────────────────────
  - type: web
    name: Frontend
    env: static
    rootDir: Frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    routes:
      # Redirect all routes to index.html for React Router SPA
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: Backend
          type: web
          property: url          # full https:// URL, not just hostname
