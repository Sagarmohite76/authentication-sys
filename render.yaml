services:
  # Single combined service — FastAPI serves both API + React frontend
  - type: web
    name: app
    env: python
    # No rootDir — build runs from repo root
    buildCommand: >
      python --version &&
      pip install --upgrade pip &&
      pip install -r Backend/requirements.txt &&
      cd Frontend && npm install && npm run build
    startCommand: "cd Backend/app && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      # ── Set these in the Render dashboard ──────────────────────
      - key: DB_Host
        sync: false
      - key: DB_User
        sync: false
      - key: DB_Password
        sync: false
      - key: DB_Name
        sync: false
      - key: Sender_Email
        sync: false
      - key: App_Password
        sync: false
